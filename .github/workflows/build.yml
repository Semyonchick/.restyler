name: Build

on:
  push:
    branches:
      - master
      - chore/remove-deprecated-deps
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Set npm version
        run: npm install --global npm@11

      - name: Refresh dependencies
        run: npm install --include=dev 2>&1 | tee install.log

      - name: Commit refreshed lockfile
        if: github.actor != 'github-actions[bot]'
        shell: bash
        run: |
          if git diff --quiet -- package-lock.json; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "chore(deps): refresh lockfile after deprecated cleanup"
          git push

      - name: Verify clean install
        run: |
          rm -rf node_modules
          npm ci --include=dev 2>&1 | tee ci.log

      - name: Verify webpack installation
        run: npx webpack --version

      - name: Build
        shell: bash
        env:
          NODE_OPTIONS: --openssl-legacy-provider
        run: npm run build 2>&1 | tee build.log

      - name: Audit all dependencies
        shell: bash
        run: |
          npm audit --audit-level=critical || true
          npm audit --json > audit-all.log || true

      - name: Audit production dependencies
        shell: bash
        run: |
          npm audit --omit=dev --audit-level=moderate

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: restyler-dependency-cleanup-logs
          path: |
            install.log
            ci.log
            build.log
            audit-all.log
          if-no-files-found: warn
          retention-days: 7
