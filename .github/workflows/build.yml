name: Build

on:
  push:
    branches:
      - master
      - chore/security-and-documentation
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Set npm version
        run: npm install --global npm@11

      - name: Install dependencies and refresh lockfile
        run: npm install --include=dev --legacy-peer-deps

      - name: Verify webpack installation
        run: npx webpack --version

      - name: Build
        id: build
        shell: bash
        env:
          NODE_OPTIONS: --openssl-legacy-provider
        run: |
          set +e
          npm run build > build.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo "===== Build summary ====="
          grep -Ei "error|failed|exception|module build failed|cannot find|not found|syntaxerror|typeerror" build.log | tail -n 80 || true
          echo "===== Last 120 build log lines ====="
          tail -n 120 build.log
          exit $status

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: restyler-build-log
          path: build.log
          if-no-files-found: error
          retention-days: 7

      - name: Audit production dependencies
        id: audit
        shell: bash
        run: |
          set +e
          npm audit --omit=dev --json > audit.log
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          npm audit --omit=dev || true
          exit $status

      - name: Upload audit log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: restyler-audit-log
          path: audit.log
          if-no-files-found: error
          retention-days: 7
