name: Build

on:
  push:
    branches:
      - master
      - chore/security-and-documentation
      - fix/pug-peer-dependency
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Set npm version
        run: npm install --global npm@11

      - name: Install dependencies
        run: npm install --include=dev

      - name: Commit refreshed lockfile
        if: github.actor != 'github-actions[bot]'
        shell: bash
        run: |
          if git diff --quiet -- package-lock.json; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "chore(deps): refresh lockfile for Pug 3 loader"
          git push

      - name: Verify clean npm install
        run: npm install --dry-run

      - name: Verify webpack installation
        run: npx webpack --version

      - name: Build
        id: build
        shell: bash
        env:
          NODE_OPTIONS: --openssl-legacy-provider
        run: |
          set +e
          npm run build > build.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo "===== Build summary ====="
          grep -Ei "error|failed|exception|module build failed|cannot find|not found|syntaxerror|typeerror" build.log | tail -n 80 || true
          echo "===== Last 120 build log lines ====="
          tail -n 120 build.log
          exit $status

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: restyler-build-log
          path: build.log
          if-no-files-found: error
          retention-days: 7

      - name: Audit production dependencies
        id: audit
        shell: bash
        run: |
          set +e
          npm audit --omit=dev --audit-level=moderate --json > audit.log
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          npm audit --omit=dev --audit-level=moderate || true
          exit $status

      - name: Upload audit log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: restyler-audit-log
          path: audit.log
          if-no-files-found: error
          retention-days: 7
